site_name: cannoli_OS
docs_dir: docs
site_url: https://cannoli.dev/
site_description: cannoli_OS Documentation
theme:
  name: material
  custom_dir: overrides/
  logo: resources/img/logo.png
  favicon: resources/img/logo.png
  language: en
  palette:
    scheme: slate
  font:
    text: Inter
  features:
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables

nav:
  - Introduction: documentation/index.md
  - Getting Started: documentation/getting-started.md
  - Directory Structure: documentation/directory-structure.md
  - Platforms: documentation/platforms.md

copyright: "&copy; 2026 cannoli_OS"

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cannoliOS
    - icon: fontawesome/brands/discord
      link: https://discord.gg/QKTjTQ796q

extra_css:
  - resources/css/theme.css

watch:
  - docs
  - mkdocs.yml
  - overrides
