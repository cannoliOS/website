<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 460" fill="none">
  <defs>
    <mask id="screen-cutout">
      <rect width="320" height="460" fill="white"/>
      <rect x="30" y="20" width="260" height="220" rx="8" ry="8" fill="black"/>
    </mask>
    <linearGradient id="glare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g mask="url(#screen-cutout)">
    <!-- Device body (square top, rounded bottom) -->
    <path d="M8,8 H312 V440 Q312,452 300,452 H20 Q8,452 8,440 Z" fill="#1a8a8a"/>

    <!-- Screen bezel (squared top corners, thin teal frame visible on sides and top) -->
    <rect x="12" y="12" width="296" height="250" fill="#111114"/>
  </g>

  <!-- Screen glass reflection -->
  <rect x="30" y="20" width="260" height="220" rx="8" ry="8" fill="url(#glare)" opacity="0.03"/>

  <!-- D-Pad (single cross shape, centered in left box) -->
  <g transform="translate(63.5, 332.5)">
    <path d="M-10,-30 L10,-30 Q12,-30 12,-28 L12,-10 L28,-10 Q30,-10 30,-8 L30,8 Q30,10 28,10 L12,10 L12,28 Q12,30 10,30 L-10,30 Q-12,30 -12,28 L-12,10 L-28,10 Q-30,10 -30,8 L-30,-8 Q-30,-10 -28,-10 L-12,-10 L-12,-28 Q-12,-30 -10,-30 Z" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <!-- Subtle center indent -->
    <rect x="-5" y="-5" width="10" height="10" rx="1" fill="#141418"/>
  </g>

  <!-- Face buttons (4 in diamond, all black) -->
  <g transform="translate(252.5, 332.5)">
    <!-- Y top -->
    <circle cx="0" cy="-22" r="12" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="0" y="-18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#444" font-weight="600">Y</text>
    <!-- A right -->
    <circle cx="22" cy="0" r="12" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="22" y="4" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#444" font-weight="600">A</text>
    <!-- B bottom -->
    <circle cx="0" cy="22" r="12" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="0" y="26" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#444" font-weight="600">B</text>
    <!-- X left -->
    <circle cx="-22" cy="0" r="12" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <text x="-22" y="4" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#444" font-weight="600">X</text>
  </g>

  <!-- Home button (convex, at corner of vertical and top horizontal lines) -->
  <circle cx="129.5" cy="276.5" r="6.5" fill="#147070" stroke="#126060" stroke-width="0.5"/>

  <!-- Start / Select stacked vertically, left-aligned to grille -->
  <g transform="translate(123, 383)">
    <!-- Select (top) -->
    <rect x="0" y="-12" width="24" height="8" rx="4" ry="4" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
    <!-- Start (bottom) -->
    <rect x="0" y="4" width="24" height="8" rx="4" ry="4" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="0.5"/>
  </g>

  <!-- Divider line from below bezel to bottom -->
  <line x1="119" y1="266" x2="119" y2="452" stroke="#14706f" stroke-width="1"/>

  <!-- Horizontal line just below bezel (4px gap from bezel bottom) -->
  <line x1="8" y1="266" x2="312" y2="266" stroke="#14706f" stroke-width="1.15"/>

  <!-- Horizontal line just above speaker grille (4px gap above top row) -->
  <line x1="8" y1="399" x2="312" y2="399" stroke="#14706f" stroke-width="1.15"/>

  <!-- Speaker grille (6 rows x 26 cols, 8px col spacing, 3 corner dots omitted) -->
  <g transform="translate(123, 403)" fill="#083838">
    <!-- row 0 -->
    <circle cx="0" cy="0" r="1.0"/><circle cx="7.4" cy="0" r="1.0"/><circle cx="14.8" cy="0" r="1.0"/><circle cx="22.2" cy="0" r="1.0"/><circle cx="29.6" cy="0" r="1.0"/><circle cx="37" cy="0" r="1.0"/><circle cx="44.4" cy="0" r="1.0"/><circle cx="51.8" cy="0" r="1.0"/><circle cx="59.2" cy="0" r="1.0"/><circle cx="66.6" cy="0" r="1.0"/><circle cx="74" cy="0" r="1.0"/><circle cx="81.4" cy="0" r="1.0"/><circle cx="88.8" cy="0" r="1.0"/><circle cx="96.2" cy="0" r="1.0"/><circle cx="103.6" cy="0" r="1.0"/><circle cx="111" cy="0" r="1.0"/><circle cx="118.4" cy="0" r="1.0"/><circle cx="125.8" cy="0" r="1.0"/><circle cx="133.2" cy="0" r="1.0"/><circle cx="140.6" cy="0" r="1.0"/><circle cx="148" cy="0" r="1.0"/><circle cx="155.4" cy="0" r="1.0"/><circle cx="162.8" cy="0" r="1.0"/><circle cx="170.2" cy="0" r="1.0"/><circle cx="177.6" cy="0" r="1.0"/><circle cx="185" cy="0" r="1.0"/>
    <!-- row 1 -->
    <circle cx="0" cy="9" r="1.0"/><circle cx="7.4" cy="9" r="1.0"/><circle cx="14.8" cy="9" r="1.0"/><circle cx="22.2" cy="9" r="1.0"/><circle cx="29.6" cy="9" r="1.0"/><circle cx="37" cy="9" r="1.0"/><circle cx="44.4" cy="9" r="1.0"/><circle cx="51.8" cy="9" r="1.0"/><circle cx="59.2" cy="9" r="1.0"/><circle cx="66.6" cy="9" r="1.0"/><circle cx="74" cy="9" r="1.0"/><circle cx="81.4" cy="9" r="1.0"/><circle cx="88.8" cy="9" r="1.0"/><circle cx="96.2" cy="9" r="1.0"/><circle cx="103.6" cy="9" r="1.0"/><circle cx="111" cy="9" r="1.0"/><circle cx="118.4" cy="9" r="1.0"/><circle cx="125.8" cy="9" r="1.0"/><circle cx="133.2" cy="9" r="1.0"/><circle cx="140.6" cy="9" r="1.0"/><circle cx="148" cy="9" r="1.0"/><circle cx="155.4" cy="9" r="1.0"/><circle cx="162.8" cy="9" r="1.0"/><circle cx="170.2" cy="9" r="1.0"/><circle cx="177.6" cy="9" r="1.0"/><circle cx="185" cy="9" r="1.0"/>
    <!-- row 2 -->
    <circle cx="0" cy="18" r="1.0"/><circle cx="7.4" cy="18" r="1.0"/><circle cx="14.8" cy="18" r="1.0"/><circle cx="22.2" cy="18" r="1.0"/><circle cx="29.6" cy="18" r="1.0"/><circle cx="37" cy="18" r="1.0"/><circle cx="44.4" cy="18" r="1.0"/><circle cx="51.8" cy="18" r="1.0"/><circle cx="59.2" cy="18" r="1.0"/><circle cx="66.6" cy="18" r="1.0"/><circle cx="74" cy="18" r="1.0"/><circle cx="81.4" cy="18" r="1.0"/><circle cx="88.8" cy="18" r="1.0"/><circle cx="96.2" cy="18" r="1.0"/><circle cx="103.6" cy="18" r="1.0"/><circle cx="111" cy="18" r="1.0"/><circle cx="118.4" cy="18" r="1.0"/><circle cx="125.8" cy="18" r="1.0"/><circle cx="133.2" cy="18" r="1.0"/><circle cx="140.6" cy="18" r="1.0"/><circle cx="148" cy="18" r="1.0"/><circle cx="155.4" cy="18" r="1.0"/><circle cx="162.8" cy="18" r="1.0"/><circle cx="170.2" cy="18" r="1.0"/><circle cx="177.6" cy="18" r="1.0"/><circle cx="185" cy="18" r="1.0"/>
    <!-- row 3 -->
    <circle cx="0" cy="27" r="1.0"/><circle cx="7.4" cy="27" r="1.0"/><circle cx="14.8" cy="27" r="1.0"/><circle cx="22.2" cy="27" r="1.0"/><circle cx="29.6" cy="27" r="1.0"/><circle cx="37" cy="27" r="1.0"/><circle cx="44.4" cy="27" r="1.0"/><circle cx="51.8" cy="27" r="1.0"/><circle cx="59.2" cy="27" r="1.0"/><circle cx="66.6" cy="27" r="1.0"/><circle cx="74" cy="27" r="1.0"/><circle cx="81.4" cy="27" r="1.0"/><circle cx="88.8" cy="27" r="1.0"/><circle cx="96.2" cy="27" r="1.0"/><circle cx="103.6" cy="27" r="1.0"/><circle cx="111" cy="27" r="1.0"/><circle cx="118.4" cy="27" r="1.0"/><circle cx="125.8" cy="27" r="1.0"/><circle cx="133.2" cy="27" r="1.0"/><circle cx="140.6" cy="27" r="1.0"/><circle cx="148" cy="27" r="1.0"/><circle cx="155.4" cy="27" r="1.0"/><circle cx="162.8" cy="27" r="1.0"/><circle cx="170.2" cy="27" r="1.0"/><circle cx="177.6" cy="27" r="1.0"/><circle cx="185" cy="27" r="1.0"/>
    <!-- row 4 (omit last dot for curve) -->
    <circle cx="0" cy="36" r="1.0"/><circle cx="7.4" cy="36" r="1.0"/><circle cx="14.8" cy="36" r="1.0"/><circle cx="22.2" cy="36" r="1.0"/><circle cx="29.6" cy="36" r="1.0"/><circle cx="37" cy="36" r="1.0"/><circle cx="44.4" cy="36" r="1.0"/><circle cx="51.8" cy="36" r="1.0"/><circle cx="59.2" cy="36" r="1.0"/><circle cx="66.6" cy="36" r="1.0"/><circle cx="74" cy="36" r="1.0"/><circle cx="81.4" cy="36" r="1.0"/><circle cx="88.8" cy="36" r="1.0"/><circle cx="96.2" cy="36" r="1.0"/><circle cx="103.6" cy="36" r="1.0"/><circle cx="111" cy="36" r="1.0"/><circle cx="118.4" cy="36" r="1.0"/><circle cx="125.8" cy="36" r="1.0"/><circle cx="133.2" cy="36" r="1.0"/><circle cx="140.6" cy="36" r="1.0"/><circle cx="148" cy="36" r="1.0"/><circle cx="155.4" cy="36" r="1.0"/><circle cx="162.8" cy="36" r="1.0"/><circle cx="170.2" cy="36" r="1.0"/><circle cx="177.6" cy="36" r="1.0"/>
    <!-- row 5 (omit last 2 dots for curve) -->
    <circle cx="0" cy="45" r="1.0"/><circle cx="7.4" cy="45" r="1.0"/><circle cx="14.8" cy="45" r="1.0"/><circle cx="22.2" cy="45" r="1.0"/><circle cx="29.6" cy="45" r="1.0"/><circle cx="37" cy="45" r="1.0"/><circle cx="44.4" cy="45" r="1.0"/><circle cx="51.8" cy="45" r="1.0"/><circle cx="59.2" cy="45" r="1.0"/><circle cx="66.6" cy="45" r="1.0"/><circle cx="74" cy="45" r="1.0"/><circle cx="81.4" cy="45" r="1.0"/><circle cx="88.8" cy="45" r="1.0"/><circle cx="96.2" cy="45" r="1.0"/><circle cx="103.6" cy="45" r="1.0"/><circle cx="111" cy="45" r="1.0"/><circle cx="118.4" cy="45" r="1.0"/><circle cx="125.8" cy="45" r="1.0"/><circle cx="133.2" cy="45" r="1.0"/><circle cx="140.6" cy="45" r="1.0"/><circle cx="148" cy="45" r="1.0"/><circle cx="155.4" cy="45" r="1.0"/><circle cx="162.8" cy="45" r="1.0"/><circle cx="170.2" cy="45" r="1.0"/>
  </g>

</svg>
