{% extends "main.html" %}

{% block header %}{% endblock %}

{% block tabs %}{% endblock %}

{% block extrahead %}
<style>
  .md-main__inner { margin-top: 0; }
</style>
{% endblock %}

{% block content %}
  {{ page.content }}
  <script>
    (function() {
      if (window.innerWidth > 900) return;
      var content = document.querySelector('.device-screen-content');
      var video = document.querySelector('.device-screen');
      var belowBtn = document.querySelector('.device-below-btn');
      var aboveLogo = document.querySelector('.device-above-logo');
      if (!content || !video) return;
      video.pause();
      function toggle() {
        content.classList.add('fade-out');
        setTimeout(function() {
          video.play();
          if (belowBtn) belowBtn.classList.add('visible');
          if (aboveLogo) aboveLogo.classList.add('visible');
        }, 600);
        setTimeout(function() {
          video.pause();
          if (belowBtn) belowBtn.classList.remove('visible');
          if (aboveLogo) aboveLogo.classList.remove('visible');
          content.classList.remove('fade-out');
          setTimeout(toggle, 5000);
        }, 16000);
      }
      setTimeout(toggle, 5000);
    })();
  </script>
{% endblock %}

{% block footer %}{% endblock %}
